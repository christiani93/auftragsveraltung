<!doctype html>
<html lang="de-CH">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anmelden – Auftragsverwaltung</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background: linear-gradient(135deg, #212529 0%, #495057 100%); min-height: 100vh; }
    .login-card { max-width: 420px; margin: 12vh auto; }
    .login-icon { font-size: 3rem; }
  </style>
</head>
<body>
<div class="container">
  <div class="card login-card shadow-lg">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <div class="login-icon">⚡</div>
        <h1 class="h4 m-0">Auftragsverwaltung</h1>
        {% if firma_name %}<div class="text-muted small">{{ firma_name }}</div>{% endif %}
      </div>

      {% if error %}
      <div class="alert alert-danger py-2">{{ error }}</div>
      {% endif %}

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, msg in messages %}
        <div class="alert alert-{{ category if category != 'message' else 'info' }} py-2">{{ msg }}</div>
        {% endfor %}
      {% endwith %}

      <form method="post">
        <div class="mb-3">
          <label class="form-label">Benutzername</label>
          <input type="text" name="username" class="form-control" autofocus required>
        </div>
        <div class="mb-3">
          <label class="form-label">Passwort</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Anmelden</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
